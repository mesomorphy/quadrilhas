<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fuck you</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: url("") no-repeat center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      width: 90%;
      max-width: 1100px;
    }

    .card {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 25px;
      color: white;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin-bottom: 10px;
      object-fit: cover;
    }

    .username {
      font-size: 18px;
      font-weight: bold;
    }

    .handle {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 15px;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.8;
      transform: scale(1.03);
    }

    .blue { background: #545454; }
    .pink { background: #ff4dff; }
    .green { background: #373738; }

  </style>
</head>

<body>

  <div class="container">

    <div class="card">
      <img src="https://images-ext-1.discordapp.net/external/Z5n1XB14PC6Sd_kXUDMSdWUdxD9_RxrHpwhzJSZ67MM/%3Fsize%3D4096/https/cdn.discordapp.com/avatars/1452800330113876119/06cf66de739445005ef8c31eda895e5d.png?format=webp&quality=lossless" class="avatar">
      <div class="username">Origem</div>
      <div class="handle">@90738
</div>

      <div class="buttons">
        <a href="https://namemc.com/profile/quadrilhas" target="_blank" class="btn blue">quadrilhas</a>
        <a href="https://namemc.com/profile/Venezuelano" target="_blank" class="btn green">Venezuelano</a>
      </div>
    </div>


    </div>

  </div>

</body>
</html>
